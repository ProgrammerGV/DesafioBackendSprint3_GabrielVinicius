<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Bank - Meu Painel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar-brand {
            font-weight: 800;
            color: #0d6efd !important;
        }

        .saldo-card {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            color: white;
            border-radius: 12px;
        }

        .btn-action {
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
        }

        .extrato-item {
            border-left: 4px solid #ccc;
        }

            .extrato-item.entrada {
                border-left-color: #198754;
            }
            .extrato-item.saida {
                border-left-color: #dc3545;
            }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4 py-3">
        <div class="container">
            <a class="navbar-brand" href="#">New Bank</a>
            <div class="d-flex align-items-center">
                <span class="me-3 fw-medium text-secondary" id="boasVindas">Olá, Carregando...</span>
                <button class="btn btn-outline-danger btn-sm fw-bold" onclick="fazerLogout()">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="saldo-card p-4 shadow mb-4">
                    <p class="mb-1 text-white-50 fw-semibold text-uppercase" style="letter-spacing: 1px;">Conta Nº <span id="numeroConta">--</span></p>
                    <h2 class="display-4 fw-bold mb-0" id="saldoAtual">R$ 0,00</h2>
                    <p class="mt-2 mb-0 opacity-75 small">Tipo: <span id="tipoContaDisplay">--</span></p>

                    <div id="infoEmpresa" class="mt-3 pt-3 border-top border-white border-opacity-25 d-none">
                        <small class="opacity-75">Limite de Empréstimo Disponível:</small>
                        <div class="fw-bold" id="limiteDisponivel">R$ 0,00</div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-4"><button class="btn btn-light w-100 btn-action shadow-sm text-success border" onclick="abrirModal('Depositar')">↑ Depositar</button></div>
                    <div class="col-4"><button class="btn btn-light w-100 btn-action shadow-sm text-danger border" onclick="abrirModal('Sacar')">↓ Sacar</button></div>
                    <div class="col-4"><button class="btn btn-primary w-100 btn-action shadow-sm border" onclick="abrirModalTransferencia()">⇄ Transferir</button></div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-12">
                        <button class="btn btn-outline-secondary w-100 btn-action bg-white shadow-sm border" onclick="abrirModalExtrato()">📄 Ver Extrato Bancário</button>
                    </div>
                </div>

                <div id="acoesEspeciais" class="row g-3 d-none">
                    <div class="col-12">
                        <button id="btnEspecial" class="btn btn-primary w-100 btn-action shadow-sm" onclick="executarAcaoEspecial()"></button>
                    </div>
                </div>

                <div id="avisoConta" class="alert alert-info mt-4 small border-0 shadow-sm text-center d-none"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTransacao" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold text-primary" id="modalTitulo">Nova Transação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="tipoTransacao">
                    <label class="form-label text-muted small">Valor (R$)</label>
                    <input type="number" id="valorTransacao" class="form-control form-control-lg" placeholder="0.00" step="0.01" min="0.01">
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary fw-bold" onclick="confirmarTransacao()">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTransferencia" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold">Realizar Transferência</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-muted small">CPF de Destino (Chave PIX)</label>
                        <input type="text" id="cpfDestino" class="form-control form-control-lg" placeholder="Ex: 12345678900">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">Valor (R$)</label>
                        <input type="number" id="valorTransferencia" class="form-control form-control-lg" placeholder="0.00" step="0.01" min="0.01">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary fw-bold" onclick="confirmarTransferencia()">Enviar PIX</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalExtrato" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold text-dark">Extrato Bancário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="listaExtrato" class="list-group list-group-flush">
                    </div>
                </div>
                <div class="modal-footer border-0 bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('tokenJwt');
        if (!token) { window.location.href = 'index.html'; }

        function decodificarToken(jwt) {
            try {
                const base64Url = jwt.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(decodeURIComponent(atob(base64).split('').map(function (c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join('')));
            } catch (e) { return null; }
        }

        const dadosToken = decodificarToken(token);
        if (dadosToken) {
            const nomeUsuario = dadosToken["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"] || "Cliente";
            document.getElementById('boasVindas').innerText = `Olá, ${nomeUsuario}`;
        }

        let contaGlobal = {};

        async function carregarMinhaConta() {
            try {
                const response = await fetch('http://localhost:5211/api/Contas/minha-conta', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const conta = await response.json();
                    contaGlobal = conta;

                    document.getElementById('saldoAtual').innerText = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(conta.saldo);
                    document.getElementById('numeroConta').innerText = conta.numeroConta;
                    document.getElementById('tipoContaDisplay').innerText = conta.tipoConta;

                    const aviso = document.getElementById('avisoConta');
                    const acoesEsp = document.getElementById('acoesEspeciais');
                    const btnEsp = document.getElementById('btnEspecial');
                    const infoEmp = document.getElementById('infoEmpresa');

                    aviso.classList.add('d-none');
                    acoesEsp.classList.add('d-none');
                    infoEmp.classList.add('d-none');

                    if (conta.ehCorrente) {
                        aviso.innerText = "Aviso da Conta Corrente: Saques e Transferências possuem uma taxa operacional de R$ 5,00.";
                        aviso.classList.remove('d-none');
                    }
                    else if (conta.ehPoupanca) {
                        acoesEsp.classList.remove('d-none');
                        btnEsp.innerText = "✨ Aplicar Rendimento";
                        btnEsp.className = "btn btn-info w-100 btn-action text-white shadow-sm";
                    }
                    else if (conta.ehEmpresarial) {
                        infoEmp.classList.remove('d-none');
                        document.getElementById('limiteDisponivel').innerText = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(conta.limiteEmprestimo);
                        acoesEsp.classList.remove('d-none');
                        btnEsp.innerText = "💼 Solicitar Empréstimo";
                        btnEsp.className = "btn btn-dark w-100 btn-action shadow-sm";
                    }
                }
            } catch (error) { console.error("Erro ao carregar conta.", error); }
        }

        async function executarAcaoEspecial() {
            if (contaGlobal.ehEmpresarial) {
                abrirModal('Emprestimo');
            } else if (contaGlobal.ehPoupanca) {
                try {
                    const response = await fetch('http://localhost:5211/api/Contas/rendimento', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        alert(data.mensagem);
                        carregarMinhaConta();
                    } else {
                        const erro = await response.text();
                        alert(`Erro: ${erro}`);
                    }
                } catch (error) { alert("Erro ao conectar com o servidor."); }
            }
        }

        carregarMinhaConta();

        let modalTransacao;
        function abrirModal(tipo) {
            document.getElementById('tipoTransacao').value = tipo;
            document.getElementById('modalTitulo').innerText = tipo;
            document.getElementById('valorTransacao').value = '';
            modalTransacao = new bootstrap.Modal(document.getElementById('modalTransacao'));
            modalTransacao.show();
        }

        async function confirmarTransacao() {
            const tipo = document.getElementById('tipoTransacao').value;
            const valor = parseFloat(document.getElementById('valorTransacao').value);

            if (!valor || valor <= 0) return alert("Por favor, insira um valor válido maior que zero.");

            const endpoint = tipo === 'Emprestimo' ? 'emprestimo' : tipo.toLowerCase();

            try {
                const response = await fetch(`http://localhost:5211/api/Contas/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ valor: valor })
                });

                if (response.ok) {
                    const data = await response.json();
                    alert(data.mensagem);
                    modalTransacao.hide();
                    carregarMinhaConta();
                } else {
                    const erro = await response.text();
                    alert(`Erro: ${erro}`);
                }
            } catch (error) { alert("Erro ao conectar com o servidor."); }
        }

        let modalTransferenciaInstancia;
        function abrirModalTransferencia() {
            document.getElementById('cpfDestino').value = '';
            document.getElementById('valorTransferencia').value = '';
            modalTransferenciaInstancia = new bootstrap.Modal(document.getElementById('modalTransferencia'));
            modalTransferenciaInstancia.show();
        }

        async function confirmarTransferencia() {
            const cpfDestino = document.getElementById('cpfDestino').value.trim();
            const valor = parseFloat(document.getElementById('valorTransferencia').value);

            if (!cpfDestino) return alert("Insira o CPF de destino.");
            if (!valor || valor <= 0) return alert("Por favor, insira um valor válido maior que zero.");

            try {
                const response = await fetch('http://localhost:5211/api/Contas/transferir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ cpfDestino: cpfDestino, valor: valor })
                });

                if (response.ok) {
                    const data = await response.json();
                    alert(data.mensagem);
                    modalTransferenciaInstancia.hide();
                    carregarMinhaConta();
                } else {
                    const erro = await response.text();
                    alert(`Erro: ${erro}`);
                }
            } catch (error) { alert("Erro ao conectar com o servidor."); }
        }

        let modalExtratoInstancia;
        async function abrirModalExtrato() {
            if (!modalExtratoInstancia) {
                modalExtratoInstancia = new bootstrap.Modal(document.getElementById('modalExtrato'));
            }

            const listaDiv = document.getElementById('listaExtrato');
            listaDiv.innerHTML = '<div class="p-4 text-center text-muted">Carregando histórico...</div>';
            modalExtratoInstancia.show();

            try {
                const response = await fetch('http://localhost:5211/api/Contas/extrato', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const transacoes = await response.json();
                    listaDiv.innerHTML = '';

                    if (transacoes.length === 0) {
                        listaDiv.innerHTML = '<div class="p-4 text-center text-muted">Nenhuma transação encontrada.</div>';
                        return;
                    }

                    transacoes.forEach(t => {
                        const ehEntrada = t.tipo.includes('Depósito') || t.tipo.includes('Recebida') || t.tipo.includes('Rendimento') || t.tipo.includes('Empréstimo');
                        const corClasse = ehEntrada ? 'entrada' : 'saida';
                        const sinal = ehEntrada ? '+' : '-';
                        const corTexto = ehEntrada ? 'text-success' : 'text-danger';

                        const valorFormatado = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(t.valor);

                        listaDiv.innerHTML += `
                                <div class="list-group-item extrato-item ${corClasse} py-3">
                                    <div class="d-flex justify-content-between align-items-center mb-1">
                                        <h6 class="mb-0 fw-bold">${t.tipo}</h6>
                                        <span class="fw-bold ${corTexto}">${sinal} ${valorFormatado}</span>
                                    </div>
                                    <small class="text-muted">${t.data}</small>
                                </div>
                            `;
                    });
                } else {
                    listaDiv.innerHTML = '<div class="p-4 text-center text-danger">Erro ao carregar extrato.</div>';
                }
            } catch (error) {
                listaDiv.innerHTML = '<div class="p-4 text-center text-danger">Erro de conexão.</div>';
            }
        }

        function fazerLogout() {
            localStorage.removeItem('tokenJwt');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
