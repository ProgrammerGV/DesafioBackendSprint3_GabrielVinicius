<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Bank - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card p-5 shadow-sm border-0 border-top border-primary border-4" style="max-width: 400px; width: 100%;">
        <h2 class="text-center text-primary mb-2 fw-bold">New Bank</h2>
        <h6 class="text-center text-muted mb-4">Acesse sua conta</h6>

        <div id="msgErro" class="alert alert-danger d-none py-2 text-center small"></div>

        <form id="formLogin">
            <div class="mb-3">
                <label class="form-label small text-muted">Usuário</label>
                <input type="text" id="usuario" class="form-control" placeholder="Digite seu usuário" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted">Senha</label>
                <input type="password" id="senha" class="form-control" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Entrar</button>
        </form>

        <div class="text-center mt-2">
            <small class="text-muted">Ainda não é cliente? <a href="registro.html" class="text-decoration-none">Abra sua conta</a></small>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function (e) {
            e.preventDefault();

            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;
            const msgErro = document.getElementById('msgErro');

            try {
                const response = await fetch('http://localhost:5211/api/Auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('tokenJwt', data.token);

                    function decodificarToken(jwt) {
                        try {
                            return JSON.parse(decodeURIComponent(atob(jwt.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
                        } catch (e) { return null; }
                    }

                    const tokenDecodificado = decodificarToken(data.token);

                    console.log("Dados que vieram no Token:", tokenDecodificado);

                    const role = tokenDecodificado["http://schemas.microsoft.com/ws/2008/06/identity/claims/role"]
                        || tokenDecodificado["role"]
                        || tokenDecodificado.Role;

                    if (role === "Admin") {
                        window.location.href = 'admin.html'; 
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    msgErro.textContent = 'Usuário ou senha incorretos.';
                    msgErro.classList.remove('d-none');
                }
            } catch (error) {
                msgErro.textContent = 'Erro de conexão com o servidor.';
                msgErro.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
